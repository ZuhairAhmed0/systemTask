openapi: 3.0.1
info:
  title: SystemTask API
  description: "OpenAPI documentation for the SystemTask backend. Authentication uses an HttpOnly cookie named `token`." 
  version: "1.0.0"
servers:
  - url: /
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: token
      description: "HttpOnly cookie named `token` used for authentication."
  schemas:
    UserRegister:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          format: password
          example: "strongPassword123"
    UserLogin:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "user@example.com"
        password:
          type: string
          format: password
          example: "strongPassword123"
    UserResponse:
      type: object
      properties:
        id:
          type: string
          example: "62f1a3e4..."
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "user@example.com"
    AuthStatus:
      type: object
      properties:
        authenticated:
          type: boolean
        user:
          $ref: '#/components/schemas/UserResponse'
    Task:
      type: object
      properties:
        id:
          type: string
          example: "609d1f8a..."
        title:
          type: string
          example: "Buy groceries"
        completed:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    TaskCreate:
      type: object
      required: [title]
      properties:
        title:
          type: string
          example: "Buy groceries"
        completed:
          type: boolean
          example: false
    TaskUpdate:
      type: object
      properties:
        title:
          type: string
          example: "Updated title"
        completed:
          type: boolean
          example: true
    Error:
      type: object
      properties:
        message:
          type: string
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/login:
    post:
      tags: [Auth]
      summary: Login a user (sets HttpOnly cookie)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        '200':
          description: Login successful. An HttpOnly cookie named `token` is set in the response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout the current user (clears cookie)
      responses:
        '200':
          description: Logged out (cookie cleared)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Logged out successfully"
  /auth/check:
    get:
      tags: [Auth]
      summary: Check authentication status
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthStatus'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /tasks:
    get:
      tags: [Tasks]
      summary: Get all tasks for the authenticated user
      security:
        - cookieAuth: []
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [Tasks]
      summary: Create a new task
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /tasks/clear-completed:
    delete:
      tags: [Tasks]
      summary: Delete all completed tasks for the authenticated user
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Deleted completed tasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedCount:
                    type: integer
                    example: 3
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /tasks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    put:
      tags: [Tasks]
      summary: Update a task
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdate'
      responses:
        '200':
          description: Updated task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags: [Tasks]
      summary: Delete a task
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Task deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Task deleted"
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
tags:
  - name: Auth
    description: Authentication endpoints
  - name: Tasks
    description: Task management endpoints


x-notes: |
  To use cookie-based authentication with this API:
  - The server sets an HttpOnly cookie named `token` on successful login.
  - Subsequent requests to protected endpoints must include that cookie. Browsers will send it automatically.
  - For testing in Swagger UI, you may need to copy the cookie value and add it manually with the `Authorize` button using a `cookie` header or configure your browser to send the cookie for the Swagger UI origin.
